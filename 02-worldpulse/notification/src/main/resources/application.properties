# Notification service config
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.auto-offset-reset=earliest
server.port=8094
camunda.client.mode=selfManaged
camunda.client.zeebe.enabled=true
camunda.client.zeebe.grpc-address=${CAMUNDA_CLIENT_ZEEBE_GRPCADDRESS:http://localhost:26500}
zeebe.client.broker.gatewayAddress=${ZEEBE_CLIENT_BROKER_GATEWAYADDRESS:localhost:26500}
zeebe.client.security.plaintext=true
