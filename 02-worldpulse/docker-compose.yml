# Adapted from Lab 4: runner/docker-compose/docker-compose-kafka-java-choreography.yml
# Extended with Camunda 8 (Zeebe) infrastructure for BPMN orchestration (E3/E4)
#
# Start everything:  docker compose up --build
# Stop everything:   docker compose down
# View logs:         docker compose logs -f process
services:

  # --- Kafka broker (message infrastructure) ---
  # Uses KRaft mode (no separate ZooKeeper needed — Kafka manages itself).
  # All 3 services connect to this broker to publish and consume events.
  kafka:
    image: confluentinc/cp-kafka:latest
    hostname: kafka                           # other containers reach Kafka at "kafka:9092"
    networks:
      - worldpulse
    ports:
      - "9092:9092"                           # internal (container-to-container) listener
      - "29092:29092"                         # external (host machine) listener — for debugging with kafka-console-consumer
    environment:
      # KRaft mode: this single node acts as both broker AND controller
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Three listeners: internal (9092), external/host (29092), controller (9093)
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Single-node setup: replication factor = 1 (no redundancy needed for dev)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # --- Signup service (entry point) ---
  # Exposes POST /api/signup → publishes SignupRequestedEvent to Kafka
  signup:
    build:
      context: ./signup
      dockerfile: Dockerfile
    networks:
      - worldpulse
    ports:
      - "8091:8091"                           # access via http://localhost:8091/api/signup
    depends_on:
      - kafka                                 # wait for Kafka to start first
    environment:
      # This overrides the bootstrap-servers in application.properties
      # so the service connects to the Kafka container (not localhost)
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CAMUNDA_CLIENT_ZEEBE_GRPCADDRESS=http://zeebe:26500
      - ZEEBE_CLIENT_BROKER_GATEWAYADDRESS=zeebe:26500
      - ZEEBE_CLIENT_SECURITY_PLAINTEXT=true

  # --- Payment service (reacts to signups) ---
  # Listens for SignupRequestedEvent → processes payment → publishes PaymentReceived/FailedEvent
  payment:
    build:
      context: ./payment
      dockerfile: Dockerfile
    networks:
      - worldpulse
    ports:
      - "8093:8093"
    depends_on:
      - kafka
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CAMUNDA_CLIENT_ZEEBE_GRPCADDRESS=http://zeebe:26500
      - ZEEBE_CLIENT_BROKER_GATEWAYADDRESS=zeebe:26500
      - ZEEBE_CLIENT_SECURITY_PLAINTEXT=true

  # --- Notification service (Exercise 2: Event Notification pattern) ---
  # Listens to ALL events on the "worldpulse" topic and logs simulated emails.
  # This is the core of the exercise — a pure consumer implementing Event Notification.
  notification:
    build:
      context: ./notification
      dockerfile: Dockerfile
    networks:
      - worldpulse
    ports:
      - "8094:8094"
    depends_on:
      - kafka
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CAMUNDA_CLIENT_ZEEBE_GRPCADDRESS=http://zeebe:26500
      - ZEEBE_CLIENT_BROKER_GATEWAYADDRESS=zeebe:26500
      - ZEEBE_CLIENT_SECURITY_PLAINTEXT=true

  # --- Elasticsearch (required by Zeebe for exporting process data) ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.16
    hostname: elasticsearch
    networks:
      - worldpulse
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - cluster.name=elasticsearch
      - bootstrap.memory_lock=true
      - cluster.routing.allocation.disk.threshold_enabled=false
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elastic:/usr/share/elasticsearch/data

  # --- Zeebe broker (Camunda 8 process engine) ---
  # Runs BPMN processes; services connect via gRPC on port 26500
  zeebe:
    image: camunda/zeebe:8.5.17
    hostname: zeebe
    networks:
      - worldpulse
    ports:
      - "26500:26500"
      - "9600:9600"
    environment:
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME=io.camunda.zeebe.exporter.ElasticsearchExporter
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_URL=http://elasticsearch:9200
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_BULK_SIZE=1
      - ZEEBE_BROKER_DATA_DISKUSAGECOMMANDWATERMARK=0.998
      - ZEEBE_BROKER_DATA_DISKUSAGEREPLICATIONWATERMARK=0.999
    depends_on:
      - elasticsearch

  # --- Operate (Camunda 8 monitoring UI) ---
  # View deployed processes, running instances, incidents at http://localhost:8085
  operate:
    image: camunda/operate:8.5.17
    hostname: operate
    networks:
      - worldpulse
    ports:
      - "8085:8080"
    environment:
      - CAMUNDA_OPERATE_ZEEBE_GATEWAYADDRESS=zeebe:26500
      - CAMUNDA_OPERATE_ELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_OPERATE_ZEEBEELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      - elasticsearch
      - zeebe

  # --- Tasklist (Camunda 8 user task UI) ---
  # For human tasks in BPMN processes at http://localhost:8086
  tasklist:
    image: camunda/tasklist:8.5.17
    hostname: tasklist
    networks:
      - worldpulse
    ports:
      - "8086:8080"
    environment:
      - CAMUNDA_TASKLIST_ZEEBE_GATEWAYADDRESS=zeebe:26500
      - CAMUNDA_TASKLIST_ELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_TASKLIST_ZEEBEELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      - elasticsearch
      - zeebe

  # --- Process service (Kafka → Zeebe bridge) ---
  # Listens for SignupRequestedEvent on Kafka, starts BPMN process instances in Zeebe
  process:
    build:
      context: ./process
      dockerfile: Dockerfile
    restart: on-failure
    networks:
      - worldpulse
    ports:
      - "8095:8095"
    depends_on:
      - kafka
      - zeebe
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CAMUNDA_CLIENT_ZEEBE_ENABLED=true
      - CAMUNDA_CLIENT_ZEEBE_GRPCADDRESS=http://zeebe:26500
      - CAMUNDA_CLIENT_MODE=selfManaged
      - ZEEBE_CLIENT_BROKER_GATEWAYADDRESS=zeebe:26500
      - ZEEBE_CLIENT_SECURITY_PLAINTEXT=true

# All containers share this network so they can reach each other by hostname
networks:
  worldpulse:
    driver: bridge

volumes:
  elastic:
    driver: local
