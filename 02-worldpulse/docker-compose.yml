# Adapted from Lab 4: runner/docker-compose/docker-compose-kafka-java-choreography.yml
# Extended with Camunda 8 (Zeebe) infrastructure for BPMN orchestration (E3/E4)
#
# Start everything:  docker compose up --build
# Stop everything:   docker compose down
# View logs:         docker compose logs -f process
services:

  # --- Kafka cluster (3 brokers + 1 dedicated KRaft controller) ---
  # Uses KRaft mode (no separate ZooKeeper needed — Kafka manages itself).
  # Three brokers with replication factor 3 for fault tolerance:
  # if one broker dies, Kafka promotes a replica and services resume.

  # Dedicated KRaft controller — manages cluster metadata only, no data.
  controller:
    image: confluentinc/cp-kafka:latest
    hostname: controller
    networks:
      - worldpulse
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller:9093

  kafka1:
    image: confluentinc/cp-kafka:latest
    hostname: kafka1
    networks:
      - worldpulse
    ports:
      - "9092:9092"                           # host access for debugging (localhost:9092)
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka1:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
    depends_on:
      - controller

  kafka2:
    image: confluentinc/cp-kafka:latest
    hostname: kafka2
    networks:
      - worldpulse
    ports:
      - "9094:9094"                           # host access for debugging (localhost:9094)
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: INTERNAL://:29094,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka2:29094,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
    depends_on:
      - controller

  kafka3:
    image: confluentinc/cp-kafka:latest
    hostname: kafka3
    networks:
      - worldpulse
    ports:
      - "9096:9096"                           # host access for debugging (localhost:9096)
    environment:
      KAFKA_NODE_ID: 4
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: INTERNAL://:29096,EXTERNAL://:9096
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka3:29096,EXTERNAL://localhost:9096
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
    depends_on:
      - controller

  # --- Signup service (entry point) ---
  # Exposes POST /api/signup → publishes SignupRequestedEvent to Kafka
  signup:
    build:
      context: ./signup
      dockerfile: Dockerfile
    networks:
      - worldpulse
    ports:
      - "8091:8091"                           # access via http://localhost:8091/api/signup
    depends_on:
      - kafka1
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka1:29092,kafka2:29094,kafka3:29096
      - CAMUNDA_CLIENT_MODE=${CAMUNDA_CLIENT_MODE:-selfManaged}
      - CAMUNDA_CLUSTER_ID=${CAMUNDA_CLUSTER_ID:-}
      - CAMUNDA_CLUSTER_REGION=${CAMUNDA_CLUSTER_REGION:-}
      - CAMUNDA_CLOUD_BASE_URL=${CAMUNDA_CLOUD_BASE_URL:-}
      - CAMUNDA_CLIENT_ID=${CAMUNDA_CLIENT_ID:-}
      - CAMUNDA_CLIENT_SECRET=${CAMUNDA_CLIENT_SECRET:-}
      - CAMUNDA_OAUTH_URL=${CAMUNDA_OAUTH_URL:-}
      - ZEEBE_GRPC_ADDRESS=${ZEEBE_GRPC_ADDRESS:-http://zeebe:26500}

  # --- Payment service (reacts to signups) ---
  # Listens for SignupRequestedEvent → processes payment → publishes PaymentReceived/FailedEvent
  payment:
    build:
      context: ./payment
      dockerfile: Dockerfile
    networks:
      - worldpulse
    ports:
      - "8093:8093"
    depends_on:
      - kafka1
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka1:29092,kafka2:29094,kafka3:29096
      - CAMUNDA_CLIENT_MODE=${CAMUNDA_CLIENT_MODE:-selfManaged}
      - CAMUNDA_CLUSTER_ID=${CAMUNDA_CLUSTER_ID:-}
      - CAMUNDA_CLUSTER_REGION=${CAMUNDA_CLUSTER_REGION:-}
      - CAMUNDA_CLOUD_BASE_URL=${CAMUNDA_CLOUD_BASE_URL:-}
      - CAMUNDA_CLIENT_ID=${CAMUNDA_CLIENT_ID:-}
      - CAMUNDA_CLIENT_SECRET=${CAMUNDA_CLIENT_SECRET:-}
      - CAMUNDA_OAUTH_URL=${CAMUNDA_OAUTH_URL:-}
      - ZEEBE_GRPC_ADDRESS=${ZEEBE_GRPC_ADDRESS:-http://zeebe:26500}

  # --- Notification service (Exercise 2: Event Notification pattern) ---
  # Listens to ALL events on the "worldpulse" topic and logs simulated emails.
  # This is the core of the exercise — a pure consumer implementing Event Notification.
  notification:
    build:
      context: ./notification
      dockerfile: Dockerfile
    networks:
      - worldpulse
    ports:
      - "8094:8094"
    depends_on:
      - kafka1
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka1:29092,kafka2:29094,kafka3:29096
      - CAMUNDA_CLIENT_MODE=${CAMUNDA_CLIENT_MODE:-selfManaged}
      - CAMUNDA_CLUSTER_ID=${CAMUNDA_CLUSTER_ID:-}
      - CAMUNDA_CLUSTER_REGION=${CAMUNDA_CLUSTER_REGION:-}
      - CAMUNDA_CLOUD_BASE_URL=${CAMUNDA_CLOUD_BASE_URL:-}
      - CAMUNDA_CLIENT_ID=${CAMUNDA_CLIENT_ID:-}
      - CAMUNDA_CLIENT_SECRET=${CAMUNDA_CLIENT_SECRET:-}
      - CAMUNDA_OAUTH_URL=${CAMUNDA_OAUTH_URL:-}
      - ZEEBE_GRPC_ADDRESS=${ZEEBE_GRPC_ADDRESS:-http://zeebe:26500}

  # --- Elasticsearch (required by Zeebe for exporting process data) ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.16
    hostname: elasticsearch
    networks:
      - worldpulse
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - cluster.name=elasticsearch
      - bootstrap.memory_lock=true
      - cluster.routing.allocation.disk.threshold_enabled=false
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elastic:/usr/share/elasticsearch/data

  # --- Zeebe broker (Camunda 8 process engine) ---
  # Runs BPMN processes; services connect via gRPC on port 26500
  zeebe:
    image: camunda/zeebe:8.5.17
    hostname: zeebe
    networks:
      - worldpulse
    ports:
      - "26500:26500"
      - "9600:9600"
    environment:
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME=io.camunda.zeebe.exporter.ElasticsearchExporter
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_URL=http://elasticsearch:9200
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_BULK_SIZE=1
      - ZEEBE_BROKER_DATA_DISKUSAGECOMMANDWATERMARK=0.998
      - ZEEBE_BROKER_DATA_DISKUSAGEREPLICATIONWATERMARK=0.999
    depends_on:
      - elasticsearch

  # --- Operate (Camunda 8 monitoring UI) ---
  # View deployed processes, running instances, incidents at http://localhost:8085
  operate:
    image: camunda/operate:8.5.17
    hostname: operate
    networks:
      - worldpulse
    ports:
      - "8085:8080"
    environment:
      - CAMUNDA_OPERATE_ZEEBE_GATEWAYADDRESS=zeebe:26500
      - CAMUNDA_OPERATE_ELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_OPERATE_ZEEBEELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      - elasticsearch
      - zeebe

  # --- Tasklist (Camunda 8 user task UI) ---
  # For human tasks in BPMN processes at http://localhost:8086
  tasklist:
    image: camunda/tasklist:8.5.17
    hostname: tasklist
    networks:
      - worldpulse
    ports:
      - "8086:8080"
    environment:
      - CAMUNDA_TASKLIST_ZEEBE_GATEWAYADDRESS=zeebe:26500
      - CAMUNDA_TASKLIST_ELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_TASKLIST_ZEEBEELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      - elasticsearch
      - zeebe

  # --- Connectors runtime (executes out-of-the-box connectors like Slack) ---
  connectors:
    image: camunda/connectors-bundle:8.5.11
    hostname: connectors
    networks:
      - worldpulse
    ports:
      - "8089:8080"
    environment:
      - ZEEBE_CLIENT_BROKER_GATEWAY-ADDRESS=zeebe:26500
      - ZEEBE_CLIENT_SECURITY_PLAINTEXT=true
      - CAMUNDA_CONNECTOR_POLLING_ENABLED=false
      - CAMUNDA_CONNECTOR_WEBHOOK_ENABLED=false
      - SLACK_OAUTH_TOKEN=xoxb-10925461763601-10897122903191-nBUN2fLAOB4FgmUK9THStwOb
      - SLACK_CHANNEL=C0ATNQPD188
    depends_on:
      - zeebe

  # --- Market Scanner (Python — financial market monitoring) ---
  # Publishes MarketAlertEvent to Kafka when significant price movements are detected.
  # V1: fires a mock alert within 2-10 seconds of startup.
  market-scanner:
    build: ./market-scanner
    container_name: market-scanner
    networks:
      - worldpulse
    depends_on:
      - kafka1
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka1:29092,kafka2:29094,kafka3:29096

  # --- BlueSky Scanner (Python — social media monitoring) ---
  # Publishes SocialTrendEvent to Kafka when trending topics or sentiment spikes are detected.
  # V1: fires a mock alert within 2-10 seconds of startup.
  bluesky-scanner:
    build: ./bluesky-scanner
    container_name: bluesky-scanner
    networks:
      - worldpulse
    depends_on:
      - kafka1
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka1:29092,kafka2:29094,kafka3:29096

  # --- Process service (Kafka → Zeebe bridge) ---
  # Listens for SignupRequestedEvent on Kafka, starts BPMN process instances in Zeebe
  process:
    build:
      context: ./process
      dockerfile: Dockerfile
    restart: on-failure
    networks:
      - worldpulse
    ports:
      - "8095:8095"
    depends_on:
      - kafka1
      - zeebe
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka1:29092,kafka2:29094,kafka3:29096
      - CAMUNDA_CLIENT_ZEEBE_ENABLED=true
      - ZEEBE_GRPC_ADDRESS=${ZEEBE_GRPC_ADDRESS:-http://zeebe:26500}
      - CAMUNDA_CLIENT_MODE=${CAMUNDA_CLIENT_MODE:-selfManaged}
      - CAMUNDA_CLUSTER_ID=${CAMUNDA_CLUSTER_ID:-}
      - CAMUNDA_CLUSTER_REGION=${CAMUNDA_CLUSTER_REGION:-}
      - CAMUNDA_CLOUD_BASE_URL=${CAMUNDA_CLOUD_BASE_URL:-}
      - CAMUNDA_CLIENT_ID=${CAMUNDA_CLIENT_ID:-}
      - CAMUNDA_CLIENT_SECRET=${CAMUNDA_CLIENT_SECRET:-}
      - CAMUNDA_OAUTH_URL=${CAMUNDA_OAUTH_URL:-}

# All containers share this network so they can reach each other by hostname
networks:
  worldpulse:
    driver: bridge

volumes:
  elastic:
    driver: local
