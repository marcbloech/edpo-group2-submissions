# Adapted from Lab 4: kafka/java/checkout/src/main/resources/application.properties
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092,localhost:9094,localhost:9096}
spring.kafka.consumer.auto-offset-reset=earliest
# Explicitly set acks=1 (leader-only acknowledgment) — pragmatic middle ground
# for best-effort worker events where acks=all latency is not justified.
spring.kafka.producer.acks=1
server.port=8091
# Zeebe connection — selfManaged by default (local Docker), override for SaaS
camunda.client.mode=${CAMUNDA_CLIENT_MODE:selfManaged}
camunda.client.zeebe.enabled=true
camunda.client.zeebe.grpc-address=${ZEEBE_GRPC_ADDRESS:http://localhost:26500}
# Cloud/SaaS properties — only effective when CAMUNDA_CLIENT_MODE=saas
camunda.client.cluster-id=${CAMUNDA_CLUSTER_ID:}
camunda.client.region=${CAMUNDA_CLUSTER_REGION:}
camunda.client.cloud.cluster-id=${CAMUNDA_CLUSTER_ID:}
camunda.client.cloud.region=${CAMUNDA_CLUSTER_REGION:}
camunda.client.cloud.base-url=${CAMUNDA_CLOUD_BASE_URL:}
camunda.client.auth.client-id=${CAMUNDA_CLIENT_ID:}
camunda.client.auth.client-secret=${CAMUNDA_CLIENT_SECRET:}
camunda.client.auth.issuer=${CAMUNDA_OAUTH_URL:}
